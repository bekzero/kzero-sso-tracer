# Deploy to Chrome Web Store
#
# SETUP (one-time):
# 1. Get Chrome Web Store credentials:
#    - Create a Google Cloud project at https://console.cloud.google.com
#    - Enable the "Chrome Web Store API" API
#    - Create an OAuth 2.0 client ID (Web application type)
#    - Copy the client ID and client secret as GitHub Secrets
#    - Run: chrome-webstore-upload authenticate <YOUR_EXTENSION_ID>
#      (this saves a refresh token to ~/.config/chrome-webstore-upload/credentials.json)
#    - Copy the refresh token content as a GitHub Secret
#
# 2. Add GitHub Secrets:
#    - CHROME_EXTENSION_ID   — your Chrome Web Store extension ID (e.g. "abcdefghijklmnop")
#    - CHROME_CLIENT_ID     — OAuth 2.0 client ID
#    - CHROME_CLIENT_SECRET — OAuth 2.0 client secret
#    - CHROME_REFRESH_TOKEN — refresh token from authenticate step
#
# 3. Uncomment the `on: workflow_dispatch` block below and push.
#
# NOTE: Publishing to the Web Store requires the extension to have passed
# Chrome Web Store review for the first publish. After that, auto-updates
# work for listed extensions.

name: Deploy to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish immediately (vs upload as draft)?"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload extension package
        run: |
          npx -y chrome-webstore-upload-cli@3.4.0 upload \
            --source dist.zip \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Publish extension
        if: ${{ inputs.publish == true || inputs.publish == 'true' }}
        run: |
          npx -y chrome-webstore-upload-cli@3.4.0 publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}